<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuck Setup Wizard — manifest.json Configurator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #0F0F1A;
    --surface2: #141428;
    --border: rgba(124,58,237,0.3);
    --border-hover: rgba(124,58,237,0.6);
    --accent: #7C3AED;
    --accent-light: #A78BFA;
    --green: #10B981;
    --red: #EF4444;
    --amber: #F59E0B;
    --white: #F9FAFB;
    --muted: #9CA3AF;
    --font-ui: system-ui, -apple-system, sans-serif;
    --font-mono: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-ui);
    font-size: 14px;
    line-height: 1.5;
  }

  .app-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  .app-header .logo {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    flex-shrink: 0;
  }

  .app-header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
  }

  .app-header .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-left: 2px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  .panel {
    overflow-y: auto;
    padding: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }

  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  .panel-left {
    border-right: 1px solid var(--border);
  }

  .section {
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Stack chips */
  .chips-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .chip {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    text-align: center;
  }

  .chip:hover {
    border-color: var(--border-hover);
    color: var(--accent-light);
  }

  .chip.selected {
    border-color: var(--accent);
    background: rgba(124,58,237,0.15);
    color: var(--accent-light);
  }

  /* Preset buttons */
  .presets-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .preset-btn {
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preset-btn:hover {
    border-color: var(--border-hover);
    color: var(--white);
    background: var(--surface2);
  }

  .preset-btn .preset-icon {
    font-size: 14px;
  }

  /* Controls */
  .control-row {
    margin-bottom: 16px;
  }

  .control-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .control-label .value-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-light);
    background: rgba(124,58,237,0.15);
    padding: 1px 7px;
    border-radius: 10px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s ease;
    min-height: 80px;
  }

  textarea:focus { border-color: var(--accent); }

  textarea::placeholder { color: var(--muted); }

  .char-count {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
  }

  .char-count.warn { color: var(--amber); }
  .char-count.over { color: var(--red); }

  /* Toggle switch */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .toggle-label-text {
    font-size: 12px;
    color: var(--muted);
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--muted);
    transition: transform 0.2s ease, background 0.2s ease;
  }

  .toggle input:checked + .toggle-track {
    background: rgba(124,58,237,0.3);
    border-color: var(--accent);
  }

  .toggle input:checked + .toggle-track::after {
    transform: translateX(16px);
    background: var(--accent-light);
  }

  /* Right panel */
  .preview-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .file-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent-light);
    background: rgba(124,58,237,0.12);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 5px;
    letter-spacing: 0.03em;
  }

  .preview-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.7;
    overflow-x: auto;
    min-height: 200px;
    white-space: pre;
    margin-bottom: 20px;
  }

  .j-key   { color: var(--accent-light); }
  .j-str   { color: var(--green); }
  .j-num   { color: var(--amber); }
  .j-bool  { color: var(--amber); }
  .j-null  { color: var(--red); }
  .j-punct { color: var(--muted); }

  .output-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .output-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 12px;
    resize: vertical;
    outline: none;
    min-height: 140px;
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .btn-primary {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 8px;
  }

  .btn-primary:hover { background: #6D28D9; }

  .btn-primary.copied {
    background: var(--green);
    pointer-events: none;
  }

  .btn-secondary {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-secondary:hover {
    border-color: var(--border-hover);
    color: var(--white);
  }

  .btn-secondary.copied {
    border-color: var(--green);
    color: var(--green);
    pointer-events: none;
  }

  /* Responsive */
  @media (max-width: 800px) {
    .layout {
      grid-template-columns: 1fr;
      height: auto;
      overflow: visible;
    }
    .panel { overflow-y: visible; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    .chips-grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 480px) {
    .chips-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">C</div>
  <div>
    <div style="display:flex;align-items:baseline;gap:8px">
      <h1>Chuck Setup Wizard</h1>
      <span class="subtitle">manifest.json configurator</span>
    </div>
  </div>
</div>

<div class="layout">

  <!-- LEFT PANEL -->
  <div class="panel panel-left">

    <!-- Presets -->
    <div class="section">
      <div class="section-label">Presets</div>
      <div class="presets-row">
        <button class="preset-btn" onclick="applyPreset('rnapp')">
          <span class="preset-icon">📱</span>
          React Native App
          <span style="margin-left:auto;font-size:10px;color:var(--muted)">React · TS · RN · Expo · Git</span>
        </button>
        <button class="preset-btn" onclick="applyPreset('webfs')">
          <span class="preset-icon">🌐</span>
          Web Full-Stack
          <span style="margin-left:auto;font-size:10px;color:var(--muted)">React · TS · Next.js · Supabase · Git</span>
        </button>
        <button class="preset-btn" onclick="applyPreset('pyapi')">
          <span class="preset-icon">🐍</span>
          Python API
          <span style="margin-left:auto;font-size:10px;color:var(--muted)">Python · Git · Testing</span>
        </button>
      </div>
    </div>

    <!-- Your Stack -->
    <div class="section">
      <div class="section-label">Your Stack</div>
      <div class="chips-grid" id="chips-grid"></div>
    </div>

    <!-- Settings -->
    <div class="section">
      <div class="section-label">Settings</div>

      <div class="control-row">
        <div class="control-label">
          Token Budget
          <span class="value-badge" id="budget-display">2000</span>
        </div>
        <input type="range" id="token-budget" min="500" max="4000" step="100" value="2000"
          oninput="state.tokenBudget = parseInt(this.value); document.getElementById('budget-display').textContent = this.value; updateAll()">
      </div>

      <div class="control-row">
        <div class="toggle-row">
          <span class="toggle-label-text">Dev mode (shows scoring debug info)</span>
          <label class="toggle">
            <input type="checkbox" id="devmode" onchange="state.devmode = this.checked; updateAll()">
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <div class="control-row">
        <div class="control-label">
          Always-on GLOBAL rules
          <span class="value-badge" id="rules-chars">0 / 800</span>
        </div>
        <textarea id="global-rules" placeholder="Be concise. Lead with the answer. Prefer editing existing files."
          oninput="onRulesInput(this)"></textarea>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel panel-right">

    <div class="preview-header">
      <span class="file-badge">manifest.json</span>
      <span style="font-size:11px;color:var(--muted)">— live preview</span>
    </div>

    <div class="preview-box" id="json-preview"></div>

    <div class="output-label">Paste this into <code style="color:var(--accent-light);font-family:var(--font-mono)">.chuck/manifest.json</code> in your project root.</div>
    <textarea class="output-textarea" id="output-textarea" readonly></textarea>

    <button class="btn-primary" id="copy-manifest-btn" onclick="copyManifest()">Copy manifest.json</button>
    <button class="btn-secondary" id="copy-init-btn" onclick="copyInit()">Copy chuck init commands</button>

  </div>

</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  selected: new Set(),
  tokenBudget: 2000,
  devmode: false,
  globalRules: ''
};

// ─── Stack definitions ────────────────────────────────────────────────────────
const STACK = [
  {
    id: 'react',
    label: 'React',
    keywords: ['component','react','tsx','jsx','hook','props','state','render']
  },
  {
    id: 'typescript',
    label: 'TypeScript',
    keywords: ['type','interface','typescript','generic','enum','infer']
  },
  {
    id: 'react_native',
    label: 'React Native',
    keywords: ['react native','mobile','ios','android','expo','screen','navigation','rn']
  },
  {
    id: 'expo',
    label: 'Expo',
    keywords: ['expo','eas','sdk','managed','bare workflow']
  },
  {
    id: 'supabase',
    label: 'Supabase',
    keywords: ['supabase','postgres','rls','row level security','edge function','realtime','auth']
  },
  {
    id: 'git',
    label: 'Git',
    keywords: ['commit','branch','merge','push','pull request','git','rebase']
  },
  {
    id: 'nodejs',
    label: 'Node.js',
    keywords: ['node','express','npm','require','module','server','api route']
  },
  {
    id: 'python',
    label: 'Python',
    keywords: ['python','pip','class','def','import','async','django','flask']
  },
  {
    id: 'vue',
    label: 'Vue',
    keywords: ['vue','component','template','composition api','pinia','nuxt']
  },
  {
    id: 'nextjs',
    label: 'Next.js',
    keywords: ['next','nextjs','app router','server component','route handler','vercel']
  },
  {
    id: 'claude_api',
    label: 'Claude API',
    keywords: ['claude','anthropic','llm','prompt','token','system prompt','tool use']
  },
  {
    id: 'testing',
    label: 'Testing',
    keywords: ['test','jest','vitest','spec','mock','assert','describe','it']
  }
];

const PRESETS = {
  rnapp:  ['react','typescript','react_native','expo','git'],
  webfs:  ['react','typescript','nextjs','supabase','git'],
  pyapi:  ['python','git','testing']
};

// ─── Render chips ─────────────────────────────────────────────────────────────
function renderChips() {
  const grid = document.getElementById('chips-grid');
  grid.innerHTML = STACK.map(s => `
    <div class="chip${state.selected.has(s.id) ? ' selected' : ''}"
      onclick="toggleChip('${s.id}')">${s.label}</div>
  `).join('');
}

function toggleChip(id) {
  if (state.selected.has(id)) {
    state.selected.delete(id);
  } else {
    state.selected.add(id);
  }
  renderChips();
  updateAll();
}

function applyPreset(key) {
  state.selected = new Set(PRESETS[key]);
  renderChips();
  updateAll();
}

// ─── Rules input ──────────────────────────────────────────────────────────────
function onRulesInput(el) {
  const val = el.value.slice(0, 800);
  if (el.value.length > 800) el.value = val;
  state.globalRules = val;
  const badge = document.getElementById('rules-chars');
  const len = val.length;
  badge.textContent = `${len} / 800`;
  badge.className = 'value-badge' + (len > 720 ? (len >= 800 ? ' over' : ' warn') : '');
  updateAll();
}

// ─── Build manifest object ────────────────────────────────────────────────────
function buildManifest() {
  const domains = {
    GLOBAL: {
      always_on: true,
      rules_file: 'domains/global.md',
      description: state.globalRules.trim() || 'Always-on project rules'
    }
  };

  STACK.forEach(s => {
    if (state.selected.has(s.id)) {
      domains[s.id] = {
        trigger: {
          keywords: s.keywords,
          fuzzy: true,
          operator: 'OR'
        },
        rules_file: `domains/${s.id}.md`,
        priority: 2
      };
    }
  });

  return {
    domains,
    token_budget: state.tokenBudget,
    devmode: state.devmode
  };
}

// ─── Syntax highlight JSON ────────────────────────────────────────────────────
function highlightJSON(obj) {
  const raw = JSON.stringify(obj, null, 2);
  // Escape HTML first
  const escaped = raw
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  return escaped.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?|[{}[\],:])/g,
    (match) => {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) {
          // key — remove trailing colon for coloring, then re-add
          return `<span class="j-key">${match.slice(0, -1)}</span><span class="j-punct">:</span>`;
        }
        return `<span class="j-str">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="j-bool">${match}</span>`;
      if (/null/.test(match)) return `<span class="j-null">${match}</span>`;
      if (/^[\d-]/.test(match)) return `<span class="j-num">${match}</span>`;
      return `<span class="j-punct">${match}</span>`;
    }
  );
}

// ─── Update everything ────────────────────────────────────────────────────────
function updateAll() {
  const manifest = buildManifest();
  const json = JSON.stringify(manifest, null, 2);

  document.getElementById('json-preview').innerHTML = highlightJSON(manifest);
  document.getElementById('output-textarea').value = json;
}

// ─── Copy handlers ────────────────────────────────────────────────────────────
function copyManifest() {
  const text = document.getElementById('output-textarea').value;
  copyText(text, 'copy-manifest-btn', 'Copy manifest.json', 'Copied!');
}

function copyInit() {
  const text = 'mkdir -p .chuck/domains\nchuck install-hook -g';
  copyText(text, 'copy-init-btn', 'Copy chuck init commands', 'Copied!');
}

function copyText(text, btnId, original, success) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = success;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderChips();
updateAll();
</script>
</body>
</html>
